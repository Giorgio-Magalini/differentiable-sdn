save_dir: 'saved_models/se_sdn_fir6'
fig_dir: 'figures/se_sdn_fir6'

sr: 48000 # <---
c: 343.0

source_index: 0

training:
  split_mode: even
  batch_size: 4          # SDN input dimension for each forward pass
  accumulation_factor: 8 # effective batch size = batch_size * accumulation_factor
  n_epochs: 300
  learning_rate: 0.01
  lambda_edc: 0.5
  lambda_edp: 1.0
  lambda_edr: 1.0

sdn:
  N: 6
  junction_type: 'householder'
  delay_buffer_len: 4096 # <---
  fir_order: 6
  alpha: 0.02
  train_distances: false
  distance_scaling: 0
  max_distance_correction: 0
